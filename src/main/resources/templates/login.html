<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/public_layout :: layout (~{::title}, ~{::content})}">

<div th:fragment="content">

    <div class="container mt-20 mx-auto" style="max-width:400px;">
        <div class="bg-white p-8 rounded-lg shadow-lg">

            <h3 class="text-2xl font-bold text-center mb-6">Login</h3>

            <form th:action="@{/login}" method="post" class="space-y-4">

                <input type="email" name="username" placeholder="Email"
                       class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">

                <input type="password" name="password" placeholder="Password"
                       class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500">

                <button type="submit"
                        class="w-full bg-blue-600 text-white p-3 rounded font-semibold hover:bg-blue-700 transition">
                    Login
                </button>

            </form>

            <p class="text-center mt-4 text-gray-600">
                Don't have an account? <a th:href="@{/register}" class="text-blue-600 hover:underline">Register</a>
            </p>

        </div>
    </div>

</div>
</html>
