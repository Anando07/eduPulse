<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Alumni</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

<!-- Navbar -->
<nav sec:authorize="!isAuthenticated()" class="bg-blue-600 text-white shadow">
    <div class="container mx-auto flex justify-between items-center p-4">
        <a th:href="@{/}" class="font-bold text-xl">🎓 Alumni</a>
        <div class="space-x-4">
            <a th:href="@{/}" class="hover:underline">Home</a>
            <a th:href="@{/about}" class="hover:underline">About</a>
            <a th:href="@{/register}" class="hover:underline">Register</a>
            <a th:href="@{/login}" class="bg-white text-blue-600 px-3 py-1 rounded">Login</a>
        </div>
    </div>
</nav>

<!-- Page content -->
<div class="flex-1 container mx-auto px-6 py-10">
    <!-- dynamically insert page fragment -->
    <div th:replace="~{${page} :: content}"></div>
</div>

<!-- Footer -->
<footer sec:authorize="!isAuthenticated()" class="bg-gray-800 text-white text-center p-4 mt-auto">
    © 2026 Alumni System
</footer>

</body>
</html>
