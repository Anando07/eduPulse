
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layouts/public_layout :: layout (~{::title}, ~{::content})}">

<div class="container mt-5">

    <div class="card p-4">

        <h3 class="text-center mb-4">Registration</h3>

        <form>

            <div class="row">

                <div class="col-md-6">
                    <input class="form-control mb-3" placeholder="Full Name">
                </div>

                <div class="col-md-6">
                    <input class="form-control mb-3" placeholder="Email">
                </div>

                <div class="col-md-6">
                    <input class="form-control mb-3" placeholder="Phone">
                </div>

                <div class="col-md-6">
                    <input class="form-control mb-3" placeholder="Passing Year">
                </div>

                <div class="col-md-6">
                    <input type="password" class="form-control mb-3" placeholder="Password">
                </div>

                <div class="col-md-6">
                    <input type="password" class="form-control mb-3" placeholder="Confirm Password">
                </div>

            </div>

            <button class="btn btn-primary w-100">Register</button>

        </form>

    </div>

</div>

</div>
</html>
